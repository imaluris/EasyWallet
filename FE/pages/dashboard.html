<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — EasyWallet</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body class="dashboard">

    <!-- Layout wrapper -->
    <div class="app-layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="logo"></div>
        <nav class="sidebar-nav">
          <a class="nav-item active" href="dashboard.html" title="Dashboard">
            <span>Dashboard</span>
            <img src="../assets/icons/layout-dashboard.svg" alt="Home" />
          </a>
          <a class="nav-item" href="transactions.html" title="Transazioni">
            <span>Transazioni</span>
            <img src="../assets/icons/arrow-left-right.svg" alt="Transazioni" />
          </a>
          <a class="nav-item" href="statistics.html" title="Statistiche">
            <span>Statistiche</span>
            <img src="../assets/icons/chart-spline.svg" alt="Statistiche" />
          </a>
          <a class="nav-item" href="profile.html" title="Profilo">
            <span>Profilo</span>
            <img src="../assets/icons/settings.svg" alt="Profilo" />
          </a>
        </nav>
      </aside>

      <!-- MAIN AREA -->
      <div class="main-area">
        <!-- TOPBAR -->
        <header class="topbar">
          <span class="topbar-title">Dashboard</span>
          <div class="topbar-right">
            <div class="topbar-avatar" id="avatar"></div>
          </div>
        </header>

        <!-- SCROLLABLE CONTENT -->
        <main>
          <div class="container">
            <!-- HERO SALDO -->
            <div class="balance-hero">
              <div class="balance-hero-left">
                <div class="balance-label">Saldo Totale</div>
                <div id="balance" class="balance-amount"></div>
              </div>
              <div class="balance-hero-stats">
                <div class="hero-stat">
                  <span class="hero-stat-label">Entrate</span>
                  <div id="income" class="hero-stat-value income"></div>
                </div>
                <div class="hero-divider"></div>
                <div class="hero-stat">
                  <span class="hero-stat-label">Uscite</span>
                  <div id="expense" class="hero-stat-value expense"></div>
                </div>
              </div>
            </div>

            <!-- DASHBOARD GRID -->
            <div class="dashboard-grid">
              <!-- COLONNA SINISTRA -->
              <div class="left-column">
                <!-- Grafico andamento -->
                <div class="card-panel">
                  <div class="panel-header">
                    <span class="panel-title">Andamento</span>
                    <span class="panel-badge">Questo mese</span>
                  </div>
                  <canvas id="lineChart"></canvas>
                </div>

                <!-- Ultime transazioni -->
                <div class="card-panel transactions-container">
                  <div class="panel-header">
                    <span class="panel-title">Ultime Transazioni</span>
                  </div>

                  <div id="list"></div>

                  <template id="transaction-template">
                    <div class="transaction">
                      <div class="tx-icon-wrap">
                        <img src="" alt="categoria" class="tx-icon-img" />
                      </div>
                      <div class="tx-info">
                        <span class="description"></span>
                        <span class="tx-date">
                          <span class="day"></span>
                          <span class="month"></span>
                          <span class="time"></span>
                        </span>
                      </div>
                      <span class="amount"></span>
                    </div>
                  </template>
                </div>
              </div>

              <!-- COLONNA DESTRA -->
              <div class="right-column">
                <!-- Form aggiungi transazione -->
                <div class="card-panel add-panel">
                  <div class="panel-header">
                    <span class="panel-title">Aggiungi Transazione</span>
                  </div>

                  <div class="type-toggle">
                    <button class="type-btn income-btn" id="typeIncome">
                      ↑ Entrata
                    </button>
                    <button class="type-btn expense-btn" id="typeExpense">
                      ↓ Uscita
                    </button>
                  </div>

                  <form id="quickForm" class="inline-form">
                    <div class="form-group">
                      <label class="form-label">Importo</label>
                      <div class="amount-wrap">
                        <span class="amount-prefix">€</span>
                        <input
                          class="form-input amount-input"
                          id="quickAmount"
                          type="number"
                          placeholder="0,00"
                          required
                        />
                      </div>
                    </div>
                    <div class="form-group">
                      <label class="form-label">Descrizione</label>
                      <input
                        class="form-input"
                        id="quickDescription"
                        type="text"
                        placeholder="Es. Affitto, Stipendio..."
                        required
                      />
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">Categoria</label>
                        <select class="form-input" id="quickCategory">
                          <option>Casa</option>
                          <option>Cibo</option>
                          <option>Lavoro</option>
                          <option>Trasporti</option>
                          <option>Altro</option>
                        </select>
                      </div>
                      <div class="form-group">
                        <label class="form-label">Data</label>
                        <input
                          class="form-input"
                          id="quickDate"
                          type="date"
                          required
                        />
                      </div>
                    </div>
                    <button type="submit" class="add-btn">+ Aggiungi</button>
                  </form>
                </div>

                <!-- Donut categorie -->
                <div class="card-panel">
                  <div class="panel-header">
                    <span class="panel-title">Categorie Uscite</span>
                  </div>
                  <canvas id="myChart"></canvas>
                </div>
              </div>
            </div>
            <!-- /dashboard-grid -->

            <p id="message"></p>
          </div>
        </main>
      </div>
      <!-- /main-area -->
    </div>
    <!-- /app-layout -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
